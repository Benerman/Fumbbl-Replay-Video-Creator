# Deploy to the self-hosted runner on the VPS.
#
# MANUAL ONLY. This workflow runs deploy/deploy.sh on the host
# (git pull + docker compose build + docker compose up -d), and the only
# way to start it is to click "Run workflow" in the Actions tab. There is
# deliberately NO `on: push:` / `workflow_run:` trigger — nothing reaches
# the self-hosted runner without a human explicitly asking for it.
#
# Why manual: the self-hosted runner executes whatever this workflow says,
# directly on the production box. Auto-deploying on every green commit
# would mean any merge to `main` runs code on the VPS unattended. Keeping
# it a manual step is the primary control on that.
#
# Layered safety:
#   - workflow_dispatch only — no automatic trigger of any kind.
#   - Self-hosted runner labelled `fumbbl-deploy`, so GitHub-hosted
#     runners can't pick this job up by mistake.
#   - Branch protection on `main` (PR + review + required CI checks) keeps
#     unvetted code off the ref you'll typically deploy.
#   - Optional GitHub Environment approval (see `environment:` below) adds
#     a second human approval gate on top of the manual click.

name: Deploy

on:
  # Manual only: deploy or roll back any branch, tag, or commit SHA.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to deploy'
        default: 'main'
        required: true
        type: string

permissions:
  contents: read

# Don't run two deploys at once — that would race on the host's
# git working tree.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: docker compose up on host
    runs-on: [self-hosted, fumbbl-deploy]

    # Uncomment to require approval from GitHub Environments reviewers
    # before this job starts — a second gate on top of the manual click.
    # Configure reviewers at:
    # Settings → Environments → production → Required reviewers.
    # environment: production

    steps:
      - name: Show deploy parameters
        run: |
          echo "Deploying ref: ${{ inputs.ref }}"
          echo "Triggered by:  ${{ github.actor }}"
          echo "Host:          $(hostname)"
          echo "Workspace:     $RUNNER_WORKSPACE"

      - name: Run deploy.sh
        # Default deploy path is /opt/<repo-name>, derived from the
        # GitHub repository so renames don't silently break this. The
        # `vars.DEPLOY_PATH` repo variable overrides if your clone
        # lives somewhere else (set at: Settings → Secrets and
        # variables → Actions → Variables).
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || format('/opt/{0}', github.event.repository.name) }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            echo "Error: $DEPLOY_PATH is not a git checkout. Clone the"
            echo "repo there before running the deploy workflow."
            exit 1
          fi
          cd "$DEPLOY_PATH"
          bash deploy/deploy.sh "$DEPLOY_REF"
